name: Deploy to GitHub Pages

on:
  push:
    branches: [ portfolio-cv ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Verify public folder does not contain sensitive documents
        run: npm run check:no-sensitive-docs

      - name: Build
        run: npm run build

      - name: Verify build output does not contain sensitive documents
        run: node scripts/check-no-sensitive-docs.mjs dist

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          token: ${{ secrets.GITHUB_TOKEN }}
